name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        run: |
          set -euxo pipefail
          echo "PWD=$(pwd)"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          ls -la
          echo "---- scripts ----"
          node -e "const p=require('./package.json'); console.log(p.scripts)"
          echo "---- next lint cmd ----"
          node -p "require('./package.json').scripts.lint"
          echo "---- node/npm ----"
          node -v
          npm -v
          echo "---- next resolved ----"
          npx --yes next --version
          echo "---- what is /lint? ----"
          test -d lint && echo "lint dir exists" || echo "NO lint dir"
          echo "---- run lint verbosely ----"
          npm run lint --loglevel verbose

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build